name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Lint
        run: uv run ruff check
      - name: Format
        run: uv run ruff format --check
      - name: Check Compose/CDK service versions
        run: uv run --group deploy --with pyyaml --with packaging python .github/scripts/check_compose_cdk_versions.py
