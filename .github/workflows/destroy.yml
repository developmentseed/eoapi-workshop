name: CDK Destroy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or tag to use"
        required: true
        default: "main"
        type: string
      environment:
        description: "Deployment environment name"
        required: true
        default: "dev"
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Configure AWS credentials
        id: aws-creds
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{  vars.DEPLOY_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Install Python dependencies
        run: uv sync --all-groups

      - name: Install Node dependencies
        run: npm install

      - name: CDK Destroy
        run: uv run npx cdk destroy --all --force
        env:
          CDK_DEFAULT_ACCOUNT: ${{ steps.aws-creds.outputs.aws-account-id }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
          PROJECT: ${{ vars.PROJECT }}
          VPC_ID: ${{ vars.VPC_ID }}
          WORKSHOP_TOKEN: ${{ vars.WORKSHOP_TOKEN }}
          PGSTAC_VERSION: ${{ vars.PGSTAC_VERSION }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
          CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}
