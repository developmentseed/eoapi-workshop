# Minimal, docker-compose-aligned values for the eoAPI workshop.
#
# Derived from the upstream `experimental.yaml` profile, trimmed to the
# components the workshop's docker-compose.yml actually runs:
#   database (pgstac), stac, raster (titiler), vector (tipg), stac-browser,
#   stac-auth-proxy + mock-oidc.
# Everything heavy is OFF: multidim, docServer, eoapi-notifier, knative,
# monitoring (metrics-server/prometheus/adapter), observability (grafana),
# and autoscaling.
#
# !!! RELEASE-NAME CONTRACT !!!
# The proxy's OIDC_DISCOVERY_INTERNAL_URL below is hard-pinned to the Service
# DNS name `eoapi-mock-oidc-server.eoapi.svc.cluster.local`. That name is
# derived from the Helm *release name* and *namespace*. You MUST install as:
#     helm install eoapi ./charts/eoapi-workshop -n eoapi --create-namespace
# Using any other release name or namespace breaks stac-auth-proxy's OIDC
# discovery. See README.md.
#
# All values are nested under `eoapi:` because eoapi is a subchart.
eoapi:
  ######################
  # DATABASE (pgstac)
  ######################
  postgresql:
    type: "postgrescluster"

  postgrescluster:
    enabled: true
    postgresVersion: 16
    postGISVersion: "3.4"
    pgBouncerReplicas: 1
    monitoring: false
    instances:
      - name: eoapi
        replicas: 1
        dataVolumeClaimSpec:
          accessModes:
            - "ReadWriteOnce"
          resources:
            requests:
              storage: "5Gi"
        resources: {}
    users:
      - name: postgres
        databases:
          - eoapi
          - postgres
        options: "SUPERUSER"
      - name: eoapi
        databases:
          - eoapi
          - postgres
        options: "CREATEDB CREATEROLE"
        password:
          type: AlphaNumeric

  ######################
  # PGSTAC BOOTSTRAP
  ######################
  pgstacBootstrap:
    enabled: true
    settings:
      # Loads STAC sample *items* so /stac has data out of the box.
      # NOTE: this does NOT load the ecoregions vector layer that the
      # docker-compose `features-loader` seeds for tipg — /vector starts
      # empty. See README "Known limitations".
      loadSamples: true
      pgstacSettings:
        queue_timeout: "10 minutes"
        use_queue: "false"
        update_collection_extent: "true"
      resources: {}

  ######################
  # CORE API SERVICES
  ######################
  stac:
    enabled: true
    ingress:
      enabled: true
      path: "/stac"
    autoscaling:
      enabled: false
    settings:
      resources: {}
      envVars:
        HOST: "0.0.0.0"
        PORT: "8080"
        WEB_CONCURRENCY: "4"
        ENABLE_TRANSACTIONS_EXTENSIONS: "true"
        # JSON-array form (matches upstream core.yaml; safest for stac-fastapi).
        STAC_FASTAPI_CORS_ORIGINS: '["*"]'

  raster:
    enabled: true
    ingress:
      enabled: true
      path: "/raster"
    autoscaling:
      enabled: false
    settings:
      resources: {}
      envVars:
        # GDAL performance settings
        GDAL_CACHEMAX: "200"
        GDAL_DISABLE_READDIR_ON_OPEN: "EMPTY_DIR"
        GDAL_INGESTED_BYTES_AT_OPEN: "32768"
        GDAL_HTTP_MERGE_CONSECUTIVE_RANGES: "YES"
        GDAL_HTTP_MULTIPLEX: "YES"
        GDAL_HTTP_VERSION: "2"
        PYTHONWARNINGS: "ignore"
        VSI_CACHE: "TRUE"
        VSI_CACHE_SIZE: "5000000"
        # Uvicorn settings
        HOST: "0.0.0.0"
        PORT: "8080"
        WEB_CONCURRENCY: "4"

  vector:
    enabled: true
    ingress:
      enabled: true
      path: "/vector"
    autoscaling:
      enabled: false
    settings:
      resources: {}
      envVars:
        TIPG_CATALOG_TTL: "300"
        HOST: "0.0.0.0"
        PORT: "8080"
        WEB_CONCURRENCY: "4"

  ######################
  # UI: STAC Browser
  ######################
  browser:
    enabled: true
    settings:
      resources: {}
    # External URL (reached from the user's browser through the ingress).
    oidcDiscoveryUrl: "http://localhost/mock-oidc/.well-known/openid-configuration"

  ######################
  # DISABLED COMPONENTS
  ######################
  multidim:
    enabled: false
  docServer:
    enabled: false
  eoapi-notifier:
    enabled: false
  knative:
    enabled: false
  monitoring:
    metricsServer:
      enabled: false
    prometheus:
      enabled: false
    prometheusAdapter:
      enabled: false
  observability:
    grafana:
      enabled: false
  autoscaling:
    enabled: false

  ######################
  # INGRESS
  ######################
  ingress:
    enabled: true
    className: "nginx"
    pathType: "Prefix"
    host: "localhost"
    tls:
      enabled: false

  ######################
  # AUTH (docker-compose parity)
  ######################
  # TEST-ONLY auth. stac-auth-proxy fronts /stac; the mock OIDC server below
  # provides discovery. DEFAULT_PUBLIC keeps reads open so the workshop
  # notebooks work without tokens. DO NOT use this setup in production.
  stac-auth-proxy:
    enabled: true
    image:
      tag: "v1.1.0"
    env:
      # Allow unauthenticated reads (workshop notebooks have no token).
      DEFAULT_PUBLIC: "true"
      # External discovery URL — must match the token issuer (mock-oidc ISSUER,
      # reached by clients through the ingress). Depends on the ingress host.
      OIDC_DISCOVERY_URL: "http://localhost/mock-oidc/.well-known/openid-configuration"
      # Internal discovery URL — the proxy fetches the OIDC config + JWKS from
      # here, in-cluster (the external host above is not resolvable from a pod).
      # Depends on release name `eoapi` + namespace `eoapi`.
      OIDC_DISCOVERY_INTERNAL_URL: "http://eoapi-mock-oidc-server.eoapi.svc.cluster.local:8080/.well-known/openid-configuration"
    # Health-check paths include the /stac ROOT_PATH the proxy serves under.
    startupProbe:
      httpGet:
        path: /stac/healthz
        port: http
      periodSeconds: 2
      failureThreshold: 30
    livenessProbe:
      httpGet:
        path: /stac/healthz
        port: http
      periodSeconds: 60
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /stac/healthz
        port: http
      periodSeconds: 5
      failureThreshold: 3

  ######################
  # TESTING: mock OIDC server  (DO NOT USE IN PRODUCTION)
  ######################
  testing:
    mockOidcServer:
      enabled: true
      replicaCount: 1
      image:
        repository: ghcr.io/alukach/mock-oidc-server
        tag: latest
        pullPolicy: IfNotPresent
      port: 8888
      clientId: "test-client"
      clientSecret: "test-secret"
      extraEnv:
        - name: ISSUER
          value: "http://localhost/mock-oidc"
        # Extra scopes the server will issue (matches docker-compose), so you
        # can mint tokens with stac:write to exercise protected transactions.
        - name: SCOPES
          value: "stac:read,stac:write"
      service:
        type: ClusterIP
        port: 8080
      ingress:
        enabled: true
        path: "/mock-oidc"
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi

  ######################
  # MISC
  ######################
  service:
    port: 8080
  serviceAccount:
    create: true
    name: ""
    automount: true
  database:
    enabled: true
    connectionPooling:
      enabled: false
