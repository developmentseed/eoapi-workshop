{{/*
Dedicated passthrough Ingress for services that must keep their path prefix.

Why this exists: the upstream eoapi ingress applies a cluster-wide
`nginx.ingress.kubernetes.io/rewrite-target: /$2` to every path. That is correct
for the API services (raster/vector strip their prefix and serve at root), but
WRONG for two components that need the prefix preserved:

  * stac-auth-proxy — runs with ROOT_PATH=/stac and serves under /stac.
  * browser (stac-browser) — the custom image is built with the /browser
    pathPrefix baked in and only serves content under /browser/.

A single ingress-wide rewrite cannot do both, so `eoapi.stac.ingress.enabled`
and `eoapi.browser.ingress.enabled` are turned off (dropping their broken,
rewritten paths from the upstream ingress) and the prefixes are routed here with
NO rewrite annotation.

Host / className / paths / TLS all come from the same upstream `eoapi.*` values,
so this stays in sync with the rest of the deployment and hardcodes nothing.
*/}}
{{- $eoapi := .Values.eoapi -}}
{{- $sap := index $eoapi "stac-auth-proxy" -}}
{{- $port := $eoapi.service.port | default 8080 -}}
{{- $paths := list -}}
{{- if and $sap $sap.enabled -}}
  {{- $paths = append $paths (dict "path" ($eoapi.stac.ingress.path | default "/stac") "service" (printf "%s-stac-auth-proxy" .Release.Name) "port" $port) -}}
{{- end -}}
{{- if and $eoapi.browser $eoapi.browser.enabled -}}
  {{- $bport := $eoapi.browser.service.port | default 8080 -}}
  {{- $paths = append $paths (dict "path" ($eoapi.browser.ingress.path | default "/browser") "service" (printf "%s-browser" .Release.Name) "port" $bport) -}}
{{- end -}}
{{/* Per-participant JupyterLabs also keep their prefix (--ServerApp.base_url=/lab/<name>). */}}
{{- if and .Values.jupyter .Values.jupyter.enabled -}}
  {{- range .Values.jupyter.participants -}}
    {{- $paths = append $paths (dict "path" (printf "/lab/%s" .name) "service" (printf "%s-%s" $.Release.Name .name) "port" 8888) -}}
  {{- end -}}
{{- end -}}
{{- if and $eoapi.ingress.enabled $paths }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-passthrough-ingress
  labels:
    app: {{ .Release.Name }}-passthrough-ingress
  {{- with $eoapi.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if $eoapi.ingress.className }}
  ingressClassName: {{ $eoapi.ingress.className }}
  {{- end }}
  rules:
    - {{- if $eoapi.ingress.host }}
      host: {{ $eoapi.ingress.host }}
      {{- end }}
      http:
        paths:
          {{- range $paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: {{ .service }}
                port:
                  number: {{ .port }}
          {{- end }}
  {{- if and $eoapi.ingress.tls.enabled $eoapi.ingress.host }}
  tls:
    - hosts:
        - {{ $eoapi.ingress.host }}
      secretName: {{ $eoapi.ingress.tls.secretName }}
  {{- end }}
{{- end }}
